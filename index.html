<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Submission form</title>
</head>
<body>
    <main>
        <h1>Contact Us</h1>
        <p>Submit your inquiry using the form below:</p>
        <form class="form" action="/submit" method="post">
            <div>
                <label for="first-name">First Name</label>
                <input type="text" id="first-name" name="first-name" autocomplete="given-name" required>
            </div>
            <div>
                <label for="last-name">Last Name</label>
                <input type="text" id="last-name" name="last-name" autocomplete="family-name" required>
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="email" required>
                <p class="form-text">
                    Please enter a valid email address.
                </p>
            </div>
            <div>
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
                <p class="form-text">What would you like to discuss?</p>
            </div>
            <div class="form-actions">
                <button type="submit">Submit</button>
            </div>
        </form>
    </main>
</body>
</html>
